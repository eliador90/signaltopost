name: Publish Posts

run-name: Publish Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes

jobs:
  publish_posts:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish_posts cron route
        run: |
          curl --fail-with-body --location --silent --show-error --request POST \
            --header "Authorization: Bearer ${{ secrets.SIGNALTOPOST_CRON_SECRET }}" \
            "${{ secrets.SIGNALTOPOST_BASE_URL }}/api/cron/publish_posts"
