name: Cleanup

run-name: Cleanup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC, review seasonally for Europe/Zurich DST

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cleanup cron route
        run: |
          curl --fail-with-body --location --silent --show-error --request POST \
            --header "Authorization: Bearer ${{ secrets.SIGNALTOPOST_CRON_SECRET }}" \
            "${{ secrets.SIGNALTOPOST_BASE_URL }}/api/cron/cleanup"
